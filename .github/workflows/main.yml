name: Foodgram build-deploy workflow
on:
  push:
    branches: [ master ]

jobs:
  build_and_push_to_docker_hub:
    name: Build Docker image and push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4  # 👈 Приведите к v4 для консистентности

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/foodgram_backend:latest

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build_and_push_to_docker_hub
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      # 🔍 Отладка: покажем, что есть в репо
      - name: Debug repo structure
        run: |
          echo "=== Root ==="
          ls -la
          echo "=== infra/ ==="
          ls -la infra/ 2>/dev/null || echo "❌ infra/ not found"
          echo "=== docs/ ==="
          ls -la docs/ 2>/dev/null || echo "❌ docs/ not found"

      - name: Create target directory on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: mkdir -p ~/foodgram

      - name: Copy files via SSH
        uses: appleboy/scp-action@v0.1.7  # или @v0 для авто-обновлений
        with:
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "infra,docs"  # 👈 Без слешей и пробелов!
          target: ~/foodgram

      - name: Execute deploy commands
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            docker rm -f foodgram-frontend foodgram-backend foodgram-db 2>/dev/null || true
            docker compose down --remove-orphans || true
            docker image rm ${{ secrets.DOCKERHUB_USERNAME }}/foodgram_backend:latest || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/foodgram_backend:latest
            docker compose up -d --remove-orphans